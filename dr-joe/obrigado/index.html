<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento confirmado — Dr. Joe Dispenza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #05030f;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: "Inter", sans-serif;
    }
    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2rem;
      font-size: 28px;
    }
    .icon-ok  { background: rgba(148,136,196,0.15); border: 1px solid rgba(148,136,196,0.35); color: rgba(192,180,224,0.90); }
    .icon-pend { background: rgba(196,152,60,0.10); border: 1px solid rgba(196,152,60,0.30); color: rgba(196,152,60,0.80); }
    h1 {
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 700;
      color: #f5f0ff;
      line-height: 1.2;
      margin-bottom: 1.25rem;
    }
    .sub {
      font-size: 1.0625rem;
      color: rgba(210,205,230,0.88);
      line-height: 1.72;
      margin-bottom: 2.5rem;
    }
    .steps {
      background: rgba(148,136,196,0.06);
      border: 1px solid rgba(148,136,196,0.18);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
      text-align: left;
    }
    .steps-lbl {
      font-size: 0.6875rem;
      color: rgba(148,136,196,0.60);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      font-variant-numeric: tabular-nums;
    }
    .step { display: flex; gap: 0.875rem; align-items: flex-start; margin-bottom: 0.75rem; }
    .step:last-child { margin-bottom: 0; }
    .step-n { font-size: 0.625rem; color: rgba(148,136,196,0.45); flex-shrink: 0; margin-top: 3px; }
    .step-txt { font-size: 0.9375rem; color: rgba(210,205,230,0.88); line-height: 1.65; }
    .btn-app {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 1.125rem 2.875rem; border-radius: 8px;
      font-weight: 600; font-size: 1rem; letter-spacing: 0.03em;
      color: #fff; text-decoration: none;
      background: linear-gradient(135deg, #7c6fc0 0%, #9488C4 50%, #b0a6d8 100%);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 0 0 1px rgba(148,136,196,0.30), 0 8px 32px rgba(100,80,180,0.40);
    }
    .back { font-size: 0.75rem; color: rgba(148,136,196,0.65); letter-spacing: 0.10em; text-decoration: none; display: block; margin-top: 1.5rem; }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(148,136,196,0.20);
      border-top-color: rgba(148,136,196,0.70);
      animation: spin 0.8s linear infinite;
      margin: 40vh auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading" class="spinner"></div>
  <div id="content" class="card" style="display:none"></div>

  <script>
    const APP_URL = "https://ecofrontend888.vercel.app";

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    const status = getParam("collection_status") || getParam("status");
    const externalRef = getParam("external_reference");
    const isApproved = status === "approved";

    /* Salva no localStorage para claim automático no app */
    if (isApproved) {
      try {
        localStorage.setItem("pending_claim_ref", externalRef || "");
        localStorage.setItem("pending_claim_product", "dr_joe_colecao");
      } catch (_) {}
    }

    /* Se está em popup da landing, avisa o opener e fecha */
    if (isApproved && window.opener && !window.opener.closed) {
      window.opener.postMessage({ type: "MP_PAYMENT_SUCCESS", externalReference: externalRef }, "*");
      setTimeout(() => window.close(), 400);
      document.getElementById("loading").style.display = "none";
      document.getElementById("content").innerHTML =
        '<p style="font-family:monospace;font-size:0.75rem;color:rgba(148,136,196,0.60);letter-spacing:0.12em;text-align:center;margin-top:40vh">Fechando…</p>';
      document.getElementById("content").style.display = "block";
    } else {
      const appUrl = externalRef
        ? `${APP_URL}/app?claim_ref=${encodeURIComponent(externalRef)}&product=dr_joe_colecao`
        : `${APP_URL}/app`;

      document.getElementById("loading").style.display = "none";
      const card = document.getElementById("content");
      card.style.display = "block";

      if (isApproved) {
        card.innerHTML = `
          <div class="icon icon-ok">✓</div>
          <h1>Pagamento confirmado.</h1>
          <p class="sub">Seu protocolo foi liberado. Acesse o app para começar.</p>
          <div class="steps">
            <p class="steps-lbl">Próximos passos</p>
            <div class="step"><span class="step-n">01</span><p class="step-txt">Acesse o app com seu e-mail</p></div>
            <div class="step"><span class="step-n">02</span><p class="step-txt">Inicie o Protocolo — Sessão 1</p></div>
            <div class="step"><span class="step-n">03</span><p class="step-txt">7 minutos por dia. Consistência é o método.</p></div>
          </div>
          <a href="${appUrl}" class="btn-app">Acessar o protocolo →</a>
        `;
      } else {
        card.innerHTML = `
          <div class="icon icon-pend">◎</div>
          <h1>Pagamento em análise</h1>
          <p class="sub">Assim que confirmado, seu acesso será liberado pelo e-mail informado na compra.</p>
          <a href="/" class="back">← Voltar ao início</a>
        `;
      }
    }
  </script>
</body>
</html>
