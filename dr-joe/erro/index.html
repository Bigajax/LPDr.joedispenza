<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento não concluído — Dr. Joe Dispenza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #05030f;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: "Inter", sans-serif;
      text-align: center;
    }
    .card { max-width: 480px; width: 100%; }
    .icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(180,60,60,0.10);
      border: 1px solid rgba(180,60,60,0.28);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2rem;
      font-size: 26px; color: rgba(220,100,100,0.80);
    }
    h1 { font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 700; color: #f5f0ff; line-height: 1.2; margin-bottom: 1.25rem; }
    p { font-size: 1.0625rem; color: rgba(210,205,230,0.72); line-height: 1.72; margin-bottom: 2.5rem; }
    .btn-try {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 1.125rem 2.875rem; border-radius: 8px;
      font-weight: 600; font-size: 1rem; letter-spacing: 0.03em;
      color: #fff; text-decoration: none;
      background: linear-gradient(135deg, #7c6fc0 0%, #9488C4 50%, #b0a6d8 100%);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 0 0 1px rgba(148,136,196,0.30), 0 8px 32px rgba(100,80,180,0.40);
    }
    .back { display: block; margin-top: 1.5rem; font-size: 0.75rem; color: rgba(148,136,196,0.60); letter-spacing: 0.10em; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✕</div>
    <h1>Pagamento não concluído</h1>
    <p>Não foi possível processar o pagamento. Nenhum valor foi cobrado. Você pode tentar novamente.</p>
    <a href="/" class="btn-try">Tentar novamente →</a>
    <a href="/" class="back">← Voltar ao início</a>
  </div>
</body>
</html>
